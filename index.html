<body class="text-[#212121] antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 16, className = "", color = "currentColor" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && window.lucide[name]) {
                    const iconElement = iconRef.current;
                    if (iconElement) {
                        iconElement.innerHTML = "";
                        const svg = window.lucide.createIcons({
                            icons: { [name]: window.lucide[name] },
                            attrs: { strokeWidth: 2.5, width: size, height: size, class: className, stroke: color }
                        });
                    }
                }
            }, [name, size, className, color]);
            return <span ref={iconRef} className="inline-flex items-center justify-center leading-none font-black"></span>;
        };

        const RollingPrice = ({ value, className = "" }) => {
            const chars = String(value).split("");
            const digitCount = chars.filter(char => /\d/.test(char)).length;
            let digitOrder = 0;

            return (
                <span className={`rolling-price ${className}`} aria-label={value}>
                    {chars.map((char, index) => {
                        if (/\d/.test(char)) {
                            const delay = (digitCount - digitOrder - 1) * 45;
                            const digit = Number(char);
                            digitOrder += 1;

                            return (
                                <span key={`digit-${index}`} className="digit-reel" aria-hidden="true">
                                    <span
                                        className="digit-track"
                                        style={{
                                            transform: `translateY(calc(-${digit} * var(--digit-height)))`,
                                            transitionDelay: `${delay}ms`
                                        }}
                                    >
                                        {Array.from({ length: 10 }, (_, number) => (
                                            <span key={number} className="digit-cell">{number}</span>
                                        ))}
                                    </span>
                                </span>
                            );
                        }

                        return (
                            <span key={`static-${index}`} className="digit-static" data-char={char} aria-hidden="true">
                                {char}
                            </span>
                        );
                    })}
                </span>
            );
        };

        const App = () => {
            const JOE_INFO = {
                name: "Joe Pine",
                title: "REALTOR RI & MA",
                team: "Platinum Real Estate Group",
                brokerage: "Keller Williams Leading Edge",
                phone: "401.327.0888",
                email: "JoePine@KW.com",
                address: "28 Thurber Blvd, Smithfield, RI 02917",
                website: "www.JoePine.com",
                headshotUrl: "Joe (1).JPG",
                logoUrl: "KellerWilliams_Realty_LeadingEdge_Logo_RGB.png",
                platinumLogoUrl: "Platinum Logo Black Transparent (1).png",
                kwSearchBase: "https://joepine.kw.com/search/sale?viewport=42.17805594042946%2C-70.57921899499948%2C41.454456956957046%2C-71.89757836999948&price=null%2C"
            };
            const MND_RATE_SOURCE_URL = "https://www.mortgagenewsdaily.com/mortgage-rates/30-year-fixed";
            const MND_RATE_PROXY_URL = `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(MND_RATE_SOURCE_URL)}`;
            const HOME_INSURANCE_RATE = 0.005;
            const ESTIMATED_CLOSING_COST_RATE = 0.03;
            const DEFAULT_RI_MEDIAN_HOME_PRICE = 499000;
            const DEFAULT_RI_MEDIAN_PAYMENT_FALLBACK = 3953;

            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [monthlyGoal, setMonthlyGoal] = useState(DEFAULT_RI_MEDIAN_PAYMENT_FALLBACK);
            const [downPaymentMode, setDownPaymentMode] = useState('percentage'); 
            const [downPaymentPercent, setDownPaymentPercent] = useState(3.5);
            const [downPaymentFixed, setDownPaymentFixed] = useState(60000);
            const [interestRate, setInterestRate] = useState("6.25");
            const [liveRateValue, setLiveRateValue] = useState(null);
            const [isRateLive, setIsRateLive] = useState(false);
            const [rateDate, setRateDate] = useState("");
            const [loanTerm, setLoanTerm] = useState(30);
            const [stateTaxRate, setStateTaxRate] = useState(1.25); 
            const [showLeadForm, setShowLeadForm] = useState(false);
            const [formSubmitted, setFormSubmitted] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isRefreshingRate, setIsRefreshingRate] = useState(true);
            const [rateError, setRateError] = useState("");

            const exportRef = useRef(null);
            const rateInputVersionRef = useRef(0);
            const rateRequestIdRef = useRef(0);
            const monthlyGoalTouchedRef = useRef(false);
            const hasSeededMonthlyGoalRef = useRef(false);

            const zeroResults = {
                homePrice: 0,
                loanAmount: 0,
                downPaymentAmount: 0,
                piti: { principalInterest: 0, taxes: 0, insurance: 0, pmi: 0 }
            };

            const [results, setResults] = useState(zeroResults);

            const PRESET_PERCENTAGES = [0, 3.5, 5, 10, 15, 20];
            const DISCLAIMER_TEXT = "This calculator is a planning tool based on your target monthly payment and estimated taxes, homeowners insurance, and mortgage insurance when applicable. Final preapproval and monthly payment can change after a lender reviews income, debts, assets, credit, loan terms, and actual property costs; only a licensed mortgage professional can issue a preapproval, and each office is independently owned and operated in support of equal housing opportunity.";
            const DOWN_PAYMENT_TIP_TEXT = "RI and MA do offer down payment and closing cost assistance for qualified buyers. Ask your lender during preapproval if you may be eligible.";
            const ESCROW_HELP_TEXT = "Your principal and interest stay more predictable, but taxes and homeowners insurance can change from one property to the next. Lenders collect those yearly costs monthly through escrow, so two homes at the same price can still have different total payments.";
            const INSURANCE_TIP_TEXT = "Homeowners insurance is one cost you can shop before closing. The premium you choose can raise or lower your final monthly mortgage payment.";

            const toNonNegativeNumber = (value) => {
                const parsed = Number.parseFloat(value);
                return Number.isFinite(parsed) && parsed > 0 ? parsed : 0;
            };

            const getPMIRate = (ltvPercent) => {
                if (ltvPercent <= 80) return 0;
                if (ltvPercent > 95) return (0.65 / 100) / 12;
                if (ltvPercent > 90) return (0.50 / 100) / 12;
                if (ltvPercent > 85) return (0.35 / 100) / 12;
                return (0.20 / 100) / 12;
            };

            const calculateResultsForPrice = ({
                price,
                interestRateValue,
                taxRateValue,
                loanTermValue,
                downPaymentModeValue,
                downPaymentPercentValue,
                downPaymentFixedValue
            }) => {
                const normalizedPrice = toNonNegativeNumber(price);
                if (!(normalizedPrice > 0)) {
                    return { ...zeroResults, totalPayment: 0 };
                }

                const normalizedInterestRate = toNonNegativeNumber(interestRateValue);
                const normalizedTaxRate = toNonNegativeNumber(taxRateValue);
                const normalizedDownPaymentPercent = Math.min(toNonNegativeNumber(downPaymentPercentValue), 100);
                const normalizedDownPaymentFixed = toNonNegativeNumber(downPaymentFixedValue);
                const normalizedLoanTerm = Math.max(Number(loanTermValue) || 0, 1) * 12;
                const r = (normalizedInterestRate / 100) / 12;
                const t = (normalizedTaxRate / 100) / 12;
                const mc = r > 0 ? (r * Math.pow(1 + r, normalizedLoanTerm)) / (Math.pow(1 + r, normalizedLoanTerm) - 1) : 1 / normalizedLoanTerm;
                const downPaymentAmount = downPaymentModeValue === 'percentage'
                    ? normalizedPrice * (normalizedDownPaymentPercent / 100)
                    : Math.min(normalizedDownPaymentFixed, normalizedPrice);
                const loanAmount = Math.max(normalizedPrice - downPaymentAmount, 0);
                const ltv = loanAmount > 0 ? (loanAmount / normalizedPrice) * 100 : 0;
                const pmiRate = loanAmount > 0 ? getPMIRate(ltv) : 0;
                const principalInterest = loanAmount * mc;
                const taxes = normalizedPrice * t;
                const insurance = (normalizedPrice * HOME_INSURANCE_RATE) / 12;
                const pmi = loanAmount * pmiRate;

                return {
                    homePrice: normalizedPrice,
                    loanAmount,
                    downPaymentAmount,
                    piti: {
                        principalInterest,
                        taxes,
                        insurance,
                        pmi
                    },
                    totalPayment: principalInterest + taxes + insurance + pmi
                };
            };

            const seedMonthlyGoalFromMedianSalePrice = (rateValue) => {
                if (hasSeededMonthlyGoalRef.current || monthlyGoalTouchedRef.current) return;

                const seededResults = calculateResultsForPrice({
                    price: DEFAULT_RI_MEDIAN_HOME_PRICE,
                    interestRateValue: rateValue,
                    taxRateValue: 1.25,
                    loanTermValue: loanTerm,
                    downPaymentModeValue: 'percentage',
                    downPaymentPercentValue: 3.5,
                    downPaymentFixedValue: downPaymentFixed
                });

                if (!(seededResults.totalPayment > 0)) return;

                setMonthlyGoal(Math.round(seededResults.totalPayment));
                hasSeededMonthlyGoalRef.current = true;
            };

            useEffect(() => {
                const initFirebase = async () => {
                    if (!window.firebase_lib || typeof __firebase_config === 'undefined') return;
                    const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore } = window.firebase_lib;
                    const firebaseConfig = JSON.parse(__firebase_config);
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    const firestore = getFirestore(app);
                    setDb(firestore);
                    const initAuth = async () => {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    };
                    initAuth();
                    const unsubscribe = onAuthStateChanged(auth, setUser);
                    return () => unsubscribe();
                };
                initFirebase();
            }, []);

            useEffect(() => {
                const handleAfterPrint = () => document.body.classList.remove('printing-export');
                window.addEventListener('afterprint', handleAfterPrint);

                return () => {
                    window.removeEventListener('afterprint', handleAfterPrint);
                    handleAfterPrint();
                };
            }, []);

            const parseLatestMortgageNewsDailyRate = (html) => {
                const surveyMatch = html.match(/MND's 30 Year Fixed \(daily survey\)[\s\S]*?<span class="hidden-xs">([^<]+)<\/span>[\s\S]*?<td class="rate">([0-9.]+)%<\/td>/i);
                if (surveyMatch) {
                    return {
                        date: surveyMatch[1].trim(),
                        rate: Number.parseFloat(surveyMatch[2])
                    };
                }

                const currentRateMatch = html.match(/<div class="current-rate"[^>]*>\s*([0-9.]+)%/i);
                if (currentRateMatch) {
                    return {
                        date: "",
                        rate: Number.parseFloat(currentRateMatch[1])
                    };
                }

                return null;
            };

            const fetchLiveRate = async () => {
                const requestId = ++rateRequestIdRef.current;
                const inputVersionAtRequestStart = rateInputVersionRef.current;
                setIsRefreshingRate(true);
                setRateError("");

                try {
                    const response = await fetch(MND_RATE_PROXY_URL, { cache: 'no-store' });
                    if (!response.ok) throw new Error(`Rate request failed with status ${response.status}`);

                    const html = await response.text();
                    const latestRate = parseLatestMortgageNewsDailyRate(html);
                    if (!latestRate || !Number.isFinite(latestRate.rate)) {
                        throw new Error('Could not parse the latest Mortgage News Daily rate.');
                    }

                    if (requestId !== rateRequestIdRef.current) return;

                    setLiveRateValue(latestRate.rate);
                    setRateDate(latestRate.date);
                    setIsRateLive(true);
                    seedMonthlyGoalFromMedianSalePrice(latestRate.rate);
                    if (rateInputVersionRef.current === inputVersionAtRequestStart) {
                        setInterestRate(latestRate.rate.toFixed(2));
                    }
                } catch (error) {
                    if (requestId !== rateRequestIdRef.current) return;
                    console.error('Unable to refresh the Mortgage News Daily rate.', error);
                    setRateError('Latest MND rate unavailable');
                    seedMonthlyGoalFromMedianSalePrice(interestRate);
                } finally {
                    if (requestId === rateRequestIdRef.current) {
                        setIsRefreshingRate(false);
                    }
                }
            };

            useEffect(() => {
                fetchLiveRate();
            }, []);

            useEffect(() => {
                const normalizedMonthlyGoal = toNonNegativeNumber(monthlyGoal);

                if (normalizedMonthlyGoal <= 0) {
                    setResults({ ...zeroResults });
                    return;
                }

                let low = 0;
                let high = 100000;
                let highResults = calculateResultsForPrice({
                    price: high,
                    interestRateValue: interestRate,
                    taxRateValue: stateTaxRate,
                    loanTermValue: loanTerm,
                    downPaymentModeValue: downPaymentMode,
                    downPaymentPercentValue: downPaymentPercent,
                    downPaymentFixedValue: downPaymentFixed
                });
                let growthSteps = 0;

                while (highResults.totalPayment <= normalizedMonthlyGoal && growthSteps < 25) {
                    high *= 2;
                    highResults = calculateResultsForPrice({
                        price: high,
                        interestRateValue: interestRate,
                        taxRateValue: stateTaxRate,
                        loanTermValue: loanTerm,
                        downPaymentModeValue: downPaymentMode,
                        downPaymentPercentValue: downPaymentPercent,
                        downPaymentFixedValue: downPaymentFixed
                    });
                    growthSteps += 1;
                }

                for (let i = 0; i < 50; i += 1) {
                    const mid = (low + high) / 2;
                    const midResults = calculateResultsForPrice({
                        price: mid,
                        interestRateValue: interestRate,
                        taxRateValue: stateTaxRate,
                        loanTermValue: loanTerm,
                        downPaymentModeValue: downPaymentMode,
                        downPaymentPercentValue: downPaymentPercent,
                        downPaymentFixedValue: downPaymentFixed
                    });
                    if (midResults.totalPayment <= normalizedMonthlyGoal) {
                        low = mid;
                    } else {
                        high = mid;
                    }
                }

                const finalResults = calculateResultsForPrice({
                    price: low,
                    interestRateValue: interestRate,
                    taxRateValue: stateTaxRate,
                    loanTermValue: loanTerm,
                    downPaymentModeValue: downPaymentMode,
                    downPaymentPercentValue: downPaymentPercent,
                    downPaymentFixedValue: downPaymentFixed
                });
                const roundedPrincipalInterest = Math.round(finalResults.piti.principalInterest);
                const roundedTaxes = Math.round(finalResults.piti.taxes);
                const roundedInsurance = Math.round(finalResults.piti.insurance);
                const roundedPmi = Math.round(finalResults.piti.pmi);
                const roundedTotalPayment = Math.round(finalResults.totalPayment);
                const displayedComponentSum = roundedPrincipalInterest + roundedTaxes + roundedInsurance + roundedPmi;
                const roundingDelta = roundedTotalPayment - displayedComponentSum;

                setResults({
                    homePrice: Math.round(finalResults.homePrice),
                    loanAmount: Math.round(finalResults.loanAmount),
                    downPaymentAmount: Math.round(finalResults.downPaymentAmount),
                    piti: {
                        principalInterest: roundedPrincipalInterest + roundingDelta,
                        taxes: roundedTaxes,
                        insurance: roundedInsurance,
                        pmi: roundedPmi
                    }
                });
            }, [monthlyGoal, downPaymentMode, downPaymentPercent, downPaymentFixed, interestRate, loanTerm, stateTaxRate]);

            const formatCurrency = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(val);

            const captureSummaryCanvas = async () => {

                    useCORS: true,
                    allowTaint: true,
                    logging: false,
                    width: exportNode.scrollWidth,
                    height: exportNode.scrollHeight,

                    windowHeight: exportNode.scrollHeight,
                    scrollX: 0,
                    scrollY: 0

            const handleSaveImage = async () => {

                link.click();

            const handleSavePdf = async () => {
                const canvas = await captureSummaryCanvas();
                if (!canvas || !window.jspdf?.jsPDF) return;

                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({ orientation: 'portrait', unit: 'pt', format: 'letter' });
                const pageWidth = pdf.internal.pageSize.getWidth();
                const pageHeight = pdf.internal.pageSize.getHeight();
                const margin = 24;
                let renderWidth = pageWidth - (margin * 2);
                let renderHeight = (canvas.height * renderWidth) / canvas.width;

                if (renderHeight > pageHeight - (margin * 2)) {
                    renderHeight = pageHeight - (margin * 2);
                    renderWidth = (canvas.width * renderHeight) / canvas.height;
                }

                const x = (pageWidth - renderWidth) / 2;
                const y = (pageHeight - renderHeight) / 2;

                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', x, y, renderWidth, renderHeight, undefined, 'FAST');

            const darkActionButtonClass = `${actionButtonBaseClass} bg-[#212121] text-white hover:bg-black`;
            const outlinedDarkActionButtonClass = `${actionButtonBaseClass} bg-white text-[#212121] border-2 border-[#212121] hover:bg-[#212121] hover:text-white`;
            const outlinedBrandActionButtonClass = `${actionButtonBaseClass} bg-white text-[#b40101] border-2 border-[#b40101] hover:bg-red-50`;
            const estimatedClosingCosts = Math.round(results.homePrice * ESTIMATED_CLOSING_COST_RATE);
            const estimatedCashNeeded = results.downPaymentAmount + estimatedClosingCosts;
            const estimatedTotalMonthlyPayment = results.piti.principalInterest + results.piti.taxes + results.piti.insurance + results.piti.pmi;
            const locationLabel = Number(stateTaxRate) === 1.15 ? "MA" : "RI";
            const closingCostLabel = `Estimated closing costs (${Math.round(ESTIMATED_CLOSING_COST_RATE * 100)}%)`;
            const parsedInterestRate = Number.parseFloat(interestRate);
            const currentRateValue = Number.isFinite(parsedInterestRate) ? parsedInterestRate : (Number.isFinite(liveRateValue) ? liveRateValue : null);

            const shareSummaryLines = [

            const emailBody = [

            const mailtoLink = `mailto:?subject=${encodeURIComponent(`Home Buying Power Estimate - ${formatCurrency(results.homePrice)}`)}&body=${encodeURIComponent(emailBody)}`;

            return (

                                <div className="export-stat">

                                    <p className="export-stat-value">{formatCurrency(estimatedTotalMonthlyPayment)}</p>
                                </div>
                                <div className="export-stat">
                                    <p className="export-stat-label">Down Payment</p>
                                    <p className="export-stat-value">{formatCurrency(results.downPaymentAmount)}</p>

                                <div className="export-stat">

                                        <span className="export-panel-value">{formatCurrency(results.piti.pmi)}</span>

                                <div className="export-panel">
                                    <p className="export-panel-title">Escrowed Funds</p>

                    <div className="app-shell">

                                                        {isRateLive ? (
                                                            <div className="flex flex-col items-end gap-0.5 font-black">
                                                                <a href={MND_RATE_SOURCE_URL} target="_blank" rel="noreferrer" className="inline-flex items-center gap-1.5 text-[10px] text-[#b40101] font-black uppercase underline-offset-2 hover:underline">
                                                                    <Icon name="Activity" size={10} className="animate-pulse" />
                                                                    Mortgage News Daily
                                                                </a>
                                                                <div className="text-[8px] text-gray-500 font-black uppercase italic leading-tight">{rateDate ? `30 year fixed as of ${rateDate}` : "Latest 30 year fixed rate"}</div>
                                                                {rateError && <div className="text-[8px] text-amber-600 font-black uppercase leading-tight">{rateError}</div>}
                                                            </div>
                                                        ) : (
                                                            <div className="text-[10px] text-gray-300 uppercase font-black leading-tight">
                                                                {rateError || (isRefreshingRate ? "Refreshing latest rate" : "Fetching 30 year fixed rate")}
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="flex items-stretch gap-2 font-black">
                                                    <input type="number" step="0.01" value={interestRate} placeholder={liveRateValue ? liveRateValue.toFixed(2) : "6.25"} onChange={(e) => {
                                                        rateInputVersionRef.current += 1;
                                                        setInterestRate(e.target.value);
                                                    }} className="w-full min-w-0 bg-gray-50 border-2 border-gray-100 rounded-lg py-3 px-4 focus:border-[#b40101] outline-none font-black text-xl" />
                                                    <button type="button" onClick={fetchLiveRate} disabled={isRefreshingRate} title="Reset to the latest Mortgage News Daily 30 year fixed rate" className="shrink-0 inline-flex items-center justify-center gap-1.5 px-3 rounded-lg border-2 border-[#b40101] bg-[#b40101] text-white hover:bg-red-700 hover:border-red-700 transition-colors leading-none text-[9px] uppercase font-black shadow-sm disabled:opacity-50 disabled:bg-[#b40101] disabled:border-[#b40101] disabled:text-white">
                                                        <Icon name="RefreshCw" size={10} color="white" className={isRefreshingRate ? "animate-spin" : ""} />
                                                        <span className="hidden md:inline">{isRefreshingRate ? "Updating" : "Reset"}</span>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="section-surface soft-surface rounded-2xl premium-shadow p-5 font-black no-print mt-auto md:min-h-[220px]">
                                    <div className="flex flex-col items-center justify-center gap-4 text-center font-black h-full">
                                        <img src={JOE_INFO.logoUrl} alt="Keller Williams Leading Edge" className="h-12 w-auto object-contain" />
                                        <img src={JOE_INFO.platinumLogoUrl} alt="Platinum Real Estate Group" className="h-14 w-auto object-contain" />
                                        <div className="text-sm leading-snug text-[#314768] font-black">
                                            <p className="uppercase tracking-[0.14em] text-[10px] text-gray-400 mb-2 font-black">Office & Brokerage</p>
                                            <p className="font-black">{addressLineOne}</p>
                                            {addressLineTwo && <p className="font-black">{addressLineTwo}</p>}
                                        </div>
                                    </div>
                                </div>

                            </div>

                            <div className="lg:col-span-8 flex flex-col gap-6 h-full text-center font-black">
                                <div className="section-surface soft-surface rounded-2xl premium-shadow overflow-hidden font-black avoid-print-break">
                                    <div className="bg-gradient-to-r from-[#b40101] via-[#c41212] to-[#8f0000] p-4 text-white flex items-center gap-2 italic font-black">
                                        <Icon name="Calculator" size={14} />
                                        <h2 className="font-black uppercase text-xs tracking-widest leading-none">Estimated Payment Snapshot</h2>
                                    </div>
                                    <div className="p-6 md:p-7 relative">
                                    <div className="max-w-4xl mx-auto mb-6">
                                        <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-3 text-left">
                                            <div className="rounded-2xl bg-white border border-gray-100 px-4 py-3 min-h-[86px] flex flex-col justify-between text-center">
                                                <p className="text-[9px] uppercase tracking-[0.12em] text-gray-400 leading-tight font-black">Monthly Payment</p>
                                                <div className="flex items-end justify-center">
                                                    <p className="text-[15px] leading-none text-[#212121] font-black">{formatCurrency(estimatedTotalMonthlyPayment)}</p>
                                                </div>
                                            </div>
                                            <div className="rounded-2xl bg-white border border-gray-100 px-4 py-3 min-h-[86px] flex flex-col justify-between text-center">
                                                <p className="text-[9px] uppercase tracking-[0.12em] text-gray-400 leading-tight font-black">Down Payment</p>
                                                <div className="flex items-end justify-center">
                                                    <p className="text-[15px] leading-none text-[#212121] font-black">{formatCurrency(results.downPaymentAmount)}</p>
                                                </div>
                                            </div>
                                            <div className="rounded-2xl bg-white border border-gray-100 px-4 py-3 min-h-[86px] flex flex-col justify-between text-center">
                                                <p className="text-[9px] uppercase tracking-[0.12em] text-gray-400 leading-tight font-black">Closing Costs (3%)</p>
                                                <div className="flex items-end justify-center">
                                                    <p className="text-[15px] leading-none text-[#212121] font-black">{formatCurrency(estimatedClosingCosts)}</p>
                                                </div>
                                            </div>
                                            <div className="rounded-2xl bg-white border border-gray-100 px-4 py-3 min-h-[86px] flex flex-col justify-between text-center">
                                                <p className="text-[9px] uppercase tracking-[0.12em] text-gray-400 leading-tight font-black">Cash To Close</p>
                                                <div className="flex items-end justify-center">
                                                    <p className="text-[15px] leading-none text-[#212121] font-black">{formatCurrency(estimatedCashNeeded)}</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="mb-6">
                                        <p className="text-base text-gray-500 max-w-2xl mx-auto mb-3 leading-relaxed tracking-tight font-black">
                                            Based on this estimated monthly payment and cash-to-close snapshot, homes in this range may be the right place to start.
                                        </p>
                                        <span className="text-[10px] uppercase tracking-[0.4em] text-gray-400 mb-1.5 block font-black leading-none">Estimated Home Price</span>
                                        <RollingPrice value={formatCurrency(results.homePrice)} className="text-5xl md:text-7xl font-extrabold text-[#198754] leading-none drop-shadow-sm" />
                                    </div>
                                     
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3 text-left leading-none font-black mb-5">
                                        <div className="bg-gray-50 p-4 rounded-xl border border-gray-100 font-black font-black">
                                            <div className="flex items-center gap-2 mb-2.5 leading-none font-black"><Icon name="Building" color="#b40101" size={14} /><h3 className="text-[12px] uppercase font-black leading-none tracking-[0.12em] text-gray-400 font-black font-black">Loan Costs</h3></div>
                                            <div className="flex justify-between items-center mb-2 leading-none font-black font-black"><span className="text-[10px] text-gray-500 uppercase tracking-[0.18em] leading-none font-black">Principal and Interest</span><span className="text-[17px] leading-none font-black font-black font-black">{formatCurrency(results.piti.principalInterest)}</span></div>
                                            <div className="flex justify-between items-center leading-none font-black font-black"><span className="text-[10px] text-gray-500 uppercase tracking-[0.18em] leading-none font-black font-black font-black">Mortgage Insurance</span><span className="text-[17px] leading-none font-black font-black font-black font-black">{formatCurrency(results.piti.pmi)}</span></div>
                                        </div>
                                        <div className="bg-gray-50 p-4 rounded-xl border border-gray-100 font-black font-black">
                                            <div className="flex items-center gap-2 mb-2.5 leading-none font-black"><Icon name="ShieldCheck" color="#b40101" size={14} /><h3 className="text-[12px] uppercase font-black leading-none tracking-[0.12em] text-gray-400 font-black font-black font-black">Escrowed Funds</h3></div>
                                            <div className="flex justify-between items-center mb-2 leading-none font-black font-black"><span className="text-[10px] text-gray-500 uppercase tracking-[0.18em] leading-none font-black font-black">Taxes</span><span className="text-[17px] leading-none font-black font-black font-black font-black">{formatCurrency(results.piti.taxes)}</span></div>
                                            <div className="flex justify-between items-center leading-none font-black font-black"><span className="text-[10px] text-gray-500 uppercase tracking-[0.18em] leading-none font-black font-black font-black font-black font-black">Insurance</span><span className="text-[17px] leading-none font-black font-black font-black font-black font-black">{formatCurrency(results.piti.insurance)}</span></div>
                                        </div>
                                    </div>

                                    <div className="text-left bg-[#fcfcfc] p-4 rounded-xl border border-gray-100 border-l-4 border-l-[#b40101] font-black font-black font-black">
                                        <h3 className="uppercase text-[8px] mb-2 flex items-center gap-2 tracking-[0.2em] leading-none italic font-black text-[#b40101] font-black font-black font-black"><Icon name="Calendar" size={12} color="#b40101" /> How Escrow Works</h3>
                                        <p className="text-[11px] text-gray-500 leading-relaxed font-black">
                                            {ESCROW_HELP_TEXT}
                                        </p>
                                    </div>

                                    <div className="text-left rounded-xl border border-red-100 bg-red-50/60 p-4 font-black">
                                        <p className="text-[10px] uppercase tracking-[0.18em] text-[#b40101] mb-1.5 font-black">Tip</p>
                                        <p className="text-[11px] text-gray-500 leading-relaxed font-black">
                                            {INSURANCE_TIP_TEXT}
                                        </p>
                                    </div>
                                    </div>
                                </div>

                                <div className="font-black leading-none no-print mt-auto">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 font-black leading-none items-stretch">
                                        <div className="bg-gradient-to-br from-[#b40101] to-[#8f0000] text-white p-5 rounded-2xl shadow-lg text-left relative overflow-hidden group font-black min-h-[220px] h-full flex flex-col justify-between border border-[#8f0000]">
                                            <div>
                                                <p className="text-[9px] uppercase tracking-[0.22em] text-red-100 mb-2 font-black">Step 1</p>
                                                <h3 className="text-lg italic uppercase mb-2 leading-none tracking-tight font-black">Get Preapproved</h3>
                                                <p className="text-[11px] mb-4 leading-relaxed font-black text-red-50">
                                                    Confirm your buying power with a licensed lender before you start touring homes.
                                                </p>
                                            </div>
                                            <a href={lenderLandingPageUrl} target="_blank" rel="noreferrer" className="w-full bg-white hover:bg-red-50 text-[#b40101] font-black py-3 rounded-xl transition-all uppercase tracking-[0.18em] text-[9px] shadow-lg flex items-center justify-center gap-2 leading-none">
                                                <Icon name="ArrowRight" size={10} color="#b40101" />
                                                View Lender Options
                                            </a>
                                        </div>
                                        <div className="bg-gradient-to-br from-[#d71920] to-[#b40101] text-white p-5 rounded-2xl shadow-lg text-left relative overflow-hidden group font-black min-h-[220px] h-full flex flex-col justify-between border border-[#b40101]">
                                            <div>
                                                <p className="text-[9px] uppercase tracking-[0.22em] text-red-100 mb-2 font-black">Step 2</p>
                                                <h3 className="text-lg italic uppercase mb-2 leading-none tracking-tight font-black">Start The Hunt</h3>
                                                <p className="text-[11px] mb-4 leading-relaxed font-black text-red-50">
                                                    Browse homes up to <span className="font-black text-white text-sm">{formatCurrency(results.homePrice)}</span> and see what is available right now.
                                                </p>
                                            </div>
                                            <a href={stepTwoLink} target="_blank" rel="noreferrer" className="w-full bg-white hover:bg-red-50 text-[#b40101] font-black py-3 rounded-xl text-center uppercase tracking-[0.18em] text-[9px] transition-all flex items-center justify-center gap-2 leading-none shadow-lg">
                                                <Icon name="Home" size={10} color="#b40101" />
                                                Browse Homes In Budget
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="footer-disclaimer mt-6 rounded-2xl border border-gray-100 p-4 text-center font-black avoid-print-break">
                            <p className="text-[10px] uppercase tracking-[0.18em] text-gray-400 mb-2 font-black">Important Estimate Disclaimer</p>
                            <p className="max-w-5xl mx-auto text-[9px] text-gray-500 leading-relaxed font-black">
                                {DISCLAIMER_TEXT}
                            </p>
                        </div>
                        <div className="action-surface mt-6 p-4 rounded-2xl premium-shadow border border-gray-100 font-black no-print">
                            <div className="text-center mb-4">
                                <p className="text-[10px] uppercase tracking-[0.18em] text-gray-400 font-black">Save Or Share This Estimate</p>
                            </div>
                            <div className="flex flex-wrap justify-center gap-3 font-black">
                                <button onClick={handlePrint} className={printButtonClass}><Icon name="Printer" size={12} color="white" /> Print</button>
                                <button onClick={handleSavePdf} className={darkActionButtonClass}><Icon name="FileText" size={12} color="white" /> Save PDF</button>
                                <button onClick={handleSaveImage} className={outlinedDarkActionButtonClass}><Icon name="Image" size={12} color="currentColor" /> Save Image</button>
                                <a href={mailtoLink} className={darkActionButtonClass}><Icon name="Mail" size={12} color="white" /> Send as Email</a>
                                <a href={smsLink} className={outlinedBrandActionButtonClass}><Icon name="MessageSquare" size={12} color="#b40101" /> Send as Text</a>
                            </div>
                        </div>
                    </div>

                    {showLeadForm && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-[#212121]/80 backdrop-blur-sm animate-in fade-in duration-300 font-black font-black">
                            <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden font-black text-[#212121] font-black font-black">
                                <div className="bg-[#b40101] p-5 text-white flex justify-between items-center font-black font-black font-black">
                                    <h3 className="text-base italic uppercase leading-none font-black font-black font-black">Verify Power</h3>
                                    <button onClick={() => setShowLeadForm(false)} className="text-white hover:text-red-200 transition-colors leading-none font-black font-black font-black"><Icon name="X" size={16} /></button>
                                </div>
                                <div className="p-6 font-black font-black font-black">
                                    {!formSubmitted ? (
                                        <form onSubmit={handleSubmitLead} className="space-y-4 font-black leading-none font-black font-black font-black">
                                            <div><label className="block text-[8px] uppercase mb-1.5 tracking-widest text-gray-400 font-black font-black font-black">Full Name</label><input required name="name" type="text" className="w-full bg-gray-50 border-2 border-gray-100 rounded-lg py-2 px-3 outline-none focus:border-[#b40101] font-black text-sm font-black font-black font-black" /></div>
                                            <div><label className="block text-[8px] uppercase mb-1.5 tracking-widest text-gray-400 font-black font-black font-black">Email Address</label><input required name="email" type="email" className="w-full bg-gray-50 border-2 border-gray-100 rounded-lg py-2 px-3 outline-none focus:border-[#b40101] font-black text-sm font-black font-black font-black font-black" /></div>
                                            <div><label className="block text-[8px] uppercase mb-1.5 tracking-widest text-gray-400 font-black font-black font-black">Cell</label><input required name="phone" type="tel" className="w-full bg-gray-50 border-2 border-gray-100 rounded-lg py-2 px-3 outline-none focus:border-[#b40101] font-black text-sm font-black font-black font-black font-black font-black" /></div>
                                            <button type="submit" disabled={isSubmitting} className="w-full bg-[#212121] hover:bg-[#b40101] text-white font-black py-3 rounded-lg uppercase text-[9px] tracking-widest transition-all mt-2 font-black leading-none font-black font-black font-black font-black disabled:opacity-50">{isSubmitting ? "Sending" : "Send to Joe Pine"}</button>
                                        </form>
                                    ) : (
                                        <div className="text-center py-8 space-y-5 font-black font-black font-black font-black">
                                            <div className="w-12 h-12 bg-green-50 text-green-600 rounded-full flex items-center justify-center mx-auto shadow-inner leading-none font-black font-black font-black font-black"><Icon name="CheckCircle" size={24} color="#16a34a" /></div>
                                            <div><h4 className="text-lg uppercase italic leading-none font-black font-black font-black font-black">Talk soon</h4><p className="text-gray-500 font-black mt-2 text-[8px] uppercase tracking-widest leading-relaxed font-black font-black font-black font-black">Info received I will be in touch shortly.</p></div>
                                            <button onClick={() => setShowLeadForm(false)} className="bg-[#212121] text-white px-8 py-2.5 rounded-lg font-black uppercase text-[9px] tracking-widest transition-all font-black leading-none font-black font-black font-black">Close</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="max-w-6xl mx-auto px-4 mt-8 pb-6 leading-none font-black text-[#212121]">
                        <div className="bg-gray-200 h-[1px] w-full mb-6 opacity-50" />
                        <div className="text-center space-y-3">
                            <p className="text-[9px] text-gray-400 uppercase tracking-[0.22em] font-black">Rhode Island and Massachusetts Real Estate</p>
                            <p className="text-sm md:text-base uppercase tracking-[0.12em] text-[#314768] font-black">{JOE_INFO.name} | {JOE_INFO.title}</p>
                            <div className="flex flex-wrap justify-center gap-x-4 gap-y-2 text-[11px] md:text-xs text-[#314768] leading-relaxed">
                                <a href={`tel:${JOE_INFO.phone.replace(/\D/g,'')}`} className="hover:text-[#b40101] transition-colors">{JOE_INFO.phone}</a>
                                <a href={`mailto:${JOE_INFO.email}`} className="hover:text-[#b40101] transition-colors">{JOE_INFO.email}</a>
                                <a href={`https://${JOE_INFO.website}`} target="_blank" rel="noreferrer" className="text-[#b40101] underline underline-offset-2 hover:text-red-700">{JOE_INFO.website}</a>
                                <span>{JOE_INFO.address}</span>
                            </div>
                        </div>
                    </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
