<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Payment to Home Price Calculator | Joe Pine</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        select { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; padding-right: 2.5rem; -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body class="bg-[#f4f4f4] text-[#212121] antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 16, className = "", color = "currentColor" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && window.lucide[name]) {
                    const iconElement = iconRef.current;
                    if (iconElement) {
                        iconElement.innerHTML = "";
                        const svg = window.lucide.createIcons({
                            icons: { [name]: window.lucide[name] },
                            attrs: { strokeWidth: 2, width: size, height: size, class: className, stroke: color }
                        });
                    }
                }
            }, [name, size, className, color]);
            return <span ref={iconRef} className="inline-flex items-center justify-center leading-none"></span>;
        };

        const App = () => {
            const JOE_INFO = {
                name: "Joe Pine",
                title: "REALTOR RI & MA",
                team: "Platinum Real Estate Group",
                brokerage: "Keller Williams Leading Edge",
                phone: "401.327.0888",
                email: "JoePine@KW.com",
                address: "28 Thurber Blvd, Smithfield, RI 02917",
                website: "www.JoePine.com",
                headshotUrl: "Joe (1).JPG",
                logoUrl: "KellerWilliams_Realty_LeadingEdge_Logo_RGB.png",
                platinumLogoUrl: "Platinum_Logo.png",
                kwSearchBase: "https://joepine.kw.com/search/sale?viewport=42.17805594042946%2C-70.57921899499948%2C41.454456956957046%2C-71.89757836999948&price=null%2C"
            };

            const [monthlyGoal, setMonthlyGoal] = useState(2500);
            const [downPaymentMode, setDownPaymentMode] = useState('percentage'); 
            const [downPaymentPercent, setDownPaymentPercent] = useState(3.5);
            const [downPaymentFixed, setDownPaymentFixed] = useState(60000);
            const [interestRate, setInterestRate] = useState(6.25);
            const [liveRateValue, setLiveRateValue] = useState(null);
            const [isRateLive, setIsRateLive] = useState(false);
            const [rateDate, setRateDate] = useState("");
            const [loanTerm, setLoanTerm] = useState(30);
            
            // Reverting to the high purchase power calibrations
            const [stateTaxRate, setStateTaxRate] = useState(1.25); 
            const [insuranceEstimate, setInsuranceEstimate] = useState(125);
            
            const [showLeadForm, setShowLeadForm] = useState(false);
            const [formSubmitted, setFormSubmitted] = useState(false);

            const [results, setResults] = useState({
                homePrice: 0,
                loanAmount: 0,
                downPaymentAmount: 0,
                piti: { principalInterest: 0, taxes: 0, insurance: 0, pmi: 0 }
            });

            // Reinstating the standard options
            const PRESET_PERCENTAGES = [0, 3.5, 5, 10, 15, 20];

            useEffect(() => {
                const fetchLiveRate = async () => {
                    const apiKey = ""; 
                    const systemPrompt = "You are a financial data provider. Search for current average 30 year fixed mortgage interest rates in the US today. Respond only with JSON: { \"rate\": 6.45, \"date\": \"Month Day Year\" }. No dashes in date.";
                    const userQuery = "What is the actual current average 30 year fixed mortgage interest rate today and today date";

                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userQuery }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                tools: [{ "google_search": {} }],
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });

                        if (response.ok) {
                            const result = await response.json();
                            const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                            if (text) {
                                try {
                                    const data = JSON.parse(text.replace(/```json/g, '').replace(/```/g, '').trim());
                                    if (data.rate) {
                                        setInterestRate(parseFloat(data.rate));
                                        setLiveRateValue(parseFloat(data.rate));
                                        setRateDate(data.date || "");
                                        setIsRateLive(true);
                                    }
                                } catch (e) {
                                    console.error("Failed to parse rate data");
                                }
                            }
                        }
                    } catch (error) { }
                };
                fetchLiveRate();
            }, []);

            useEffect(() => {
                const r = (interestRate / 100) / 12;
                const n = loanTerm * 12;
                const t = (stateTaxRate / 100) / 12;
                const mc = r > 0 ? (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1) : 1 / n;
                
                let finalPrice = 0;
                let finalDown = 0;
                let pmiRate = 0;

                // Restoring the realistic tiered PMI schedule
                const getPMIRate = (ltvPercent) => {
                    if (ltvPercent <= 80) return 0;
                    if (ltvPercent > 95) return (0.65 / 100) / 12; // Back to 0.65 for 3.5% down
                    if (ltvPercent > 90) return (0.50 / 100) / 12; // Back to 0.50 for 5% down
                    if (ltvPercent > 85) return (0.35 / 100) / 12; 
                    return (0.20 / 100) / 12; // Matches your LE for high down scenarios
                };

                if (downPaymentMode === 'percentage') {
                    const p = downPaymentPercent / 100;
                    const ltv = (1 - p) * 100;
                    pmiRate = getPMIRate(ltv);
                    finalPrice = (monthlyGoal - insuranceEstimate) / (((1 - p) * mc) + t + ((1 - p) * pmiRate));
                    finalDown = finalPrice * p;
                } else {
                    const initialPrice = (monthlyGoal - insuranceEstimate + (downPaymentFixed * mc)) / (mc + t);
                    const ltv = ((initialPrice - downPaymentFixed) / initialPrice) * 100;
                    pmiRate = getPMIRate(ltv);
                    finalPrice = (monthlyGoal - insuranceEstimate + (downPaymentFixed * mc) + (downPaymentFixed * pmiRate)) / (mc + t + pmiRate);
                    finalDown = downPaymentFixed;
                }

                setResults({
                    homePrice: Math.round(finalPrice),
                    loanAmount: Math.round(finalPrice - finalDown),
                    downPaymentAmount: Math.round(finalDown),
                    piti: {
                        principalInterest: Math.round((finalPrice - finalDown) * mc),
                        taxes: Math.round(finalPrice * t),
                        insurance: insuranceEstimate,
                        pmi: Math.round((finalPrice - finalDown) * pmiRate)
                    }
                });
            }, [monthlyGoal, downPaymentMode, downPaymentPercent, downPaymentFixed, interestRate, loanTerm, stateTaxRate, insuranceEstimate]);

            const formatCurrency = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(val);

            return (
                <div className="pb-20 font-black text-[#212121]">
                    <nav className="bg-white py-4 px-6 sticky top-0 z-50 shadow-md border-b-4 border-[#b40101]">
                        <div className="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <img src={JOE_INFO.logoUrl} alt="Keller Williams Logo" className="h-10 w-auto object-contain" onError={(e) => { e.target.style.display = 'none'; }} />
                                <div className="h-8 w-[1px] bg-gray-200 hidden sm:block" />
                                <img src={JOE_INFO.platinumLogoUrl} alt="Platinum Logo" className="h-10 w-auto object-contain" onError={(e) => { e.target.style.display = 'none'; }} />
                                <div className="h-8 w-[1px] bg-gray-200 hidden sm:block" />
                                <div className="hidden sm:block">
                                    <p className="text-[10px] text-gray-400 uppercase leading-tight">{JOE_INFO.brokerage}</p>
                                </div>
                            </div>
                            <div className="text-center sm:text-right">
                                <p className="text-sm uppercase italic leading-none">{JOE_INFO.name}</p>
                                <p className="text-xs text-[#b40101] mt-1 tracking-tight font-black">{JOE_INFO.phone}</p>
                            </div>
                        </div>
                    </nav>

                    <div className="max-w-6xl mx-auto px-4 pt-8">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                            <div className="lg:col-span-4 space-y-6">
                                <div className="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                                    <div className="bg-[#b40101] p-4 text-white uppercase text-sm flex items-center gap-2 italic tracking-tighter leading-none">
                                        <Icon name="Calculator" size={16} /> Budget Parameters
                                    </div>
                                    <div className="p-6 space-y-5">
                                        <div>
                                            <label className="block text-xs uppercase mb-2 tracking-wide leading-none">Monthly Payment Goal</label>
                                            <div className="relative"><span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">$</span>
                                                <input type="number" value={monthlyGoal} onChange={(e) => setMonthlyGoal(Number(e.target.value))} className="w-full bg-gray-50 border-2 border-gray-100 rounded-md py-4 pl-10 pr-4 focus:border-[#b40101] outline-none text-xl" />
                                            </div>
                                        </div>
                                        <div>
                                            <div className="flex justify-between items-end mb-2 leading-none">
                                                <label className="block text-xs uppercase tracking-wide leading-none">Down Payment</label>
                                                <div className="flex bg-gray-100 p-1 rounded-md overflow-hidden">
                                                    <button onClick={() => setDownPaymentMode('percentage')} className={`px-6 py-2 text-sm transition-all ${downPaymentMode === 'percentage' ? 'bg-white text-[#b40101] shadow-sm' : 'text-gray-400'}`}>%</button>
                                                    <button onClick={() => setDownPaymentMode('fixed')} className={`px-6 py-2 text-sm transition-all ${downPaymentMode === 'fixed' ? 'bg-white text-[#b40101] shadow-sm' : 'text-gray-400'}`}>$</button>
                                                </div>
                                            </div>
                                            {downPaymentMode === 'percentage' ? (
                                                <div className="space-y-3 leading-none">
                                                    <div className="grid grid-cols-3 gap-2">
                                                        {PRESET_PERCENTAGES.map(pct => (
                                                            <button key={pct} onClick={() => setDownPaymentPercent(pct)} className={`py-2 text-xs rounded border-2 transition-all ${downPaymentPercent === pct ? 'border-[#b40101] bg-red-50 text-[#b40101]' : 'border-gray-100 text-gray-400'}`}>{pct}%</button>
                                                        ))}
                                                    </div>
                                                    <div className="bg-gray-50 p-3 rounded flex justify-between items-center"><span className="text-[10px] text-gray-400 uppercase tracking-widest leading-none">Estimated Cash</span><span className="text-sm font-black">{formatCurrency(results.downPaymentAmount)}</span></div>
                                                </div>
                                            ) : (
                                                <div className="relative leading-none"><span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">$</span>
                                                    <input type="number" value={downPaymentFixed} onChange={(e) => setDownPaymentFixed(Number(e.target.value))} className="w-full bg-gray-50 border-2 border-gray-100 rounded-md py-3 pl-10 pr-4 focus:border-[#b40101] outline-none font-black" />
                                                </div>
                                            )}
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-1">
                                                <label className="block text-xs uppercase mb-2 leading-none">Rate %</label>
                                                <input type="number" step="0.01" value={interestRate} onChange={(e) => setInterestRate(Number(e.target.value))} className="w-full bg-gray-50 border-2 border-gray-100 rounded-md py-3 px-4 focus:border-[#b40101] outline-none font-black" />
                                                <div className="pt-2 px-1 min-h-[52px]">
                                                    {isRateLive ? (
                                                        <div className="space-y-1">
                                                            <div className="flex items-center gap-1.5 text-xs text-[#b40101] uppercase leading-none"><Icon name="Activity" size={12} className="animate-pulse" color="#b40101" /> Live Rates</div>
                                                            <div className="text-[10px] text-gray-600 uppercase italic leading-tight">Interest rate as of {rateDate}</div>
                                                            {interestRate !== liveRateValue && (
                                                                <button onClick={() => setInterestRate(liveRateValue)} className="flex items-center gap-1 text-[9px] bg-gray-100 py-1 px-2 rounded uppercase mt-1 hover:bg-gray-200 transition-colors leading-none tracking-widest"><Icon name="RefreshCw" size={8} /> Realign</button>
                                                            )}
                                                        </div>
                                                    ) : <div className="text-[10px] text-gray-400 uppercase animate-pulse leading-tight tracking-widest">Gathering market data</div>}
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-xs uppercase mb-2 leading-none">Location</label>
                                                <select value={stateTaxRate} onChange={(e) => setStateTaxRate(Number(e.target.value))} className="w-full bg-gray-50 border-2 border-gray-100 rounded-md py-3 px-4 focus:border-[#b40101] outline-none font-black">
                                                    <option value={1.25}>RI</option>
                                                    <option value={1.15}>MA</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-[#212121] p-6 rounded-lg text-white leading-relaxed">
                                    <h3 className="uppercase text-xs mb-3 flex items-center gap-2 tracking-widest leading-none italic"><Icon name="Calendar" size={16} color="#b40101" /> How Escrow Works</h3>
                                    <p className="text-sm text-gray-300 leading-relaxed font-medium">Banks keep your housing budget simple. They take your yearly insurance and tax bill then divide them by 12 months so they can collect them with your mortgage. This keeps your monthly payment predictable.</p>
                                </div>
                            </div>

                            <div className="lg:col-span-8 space-y-6 text-center">
                                <div className="bg-white rounded-lg shadow-sm border-t-4 border-[#b40101] p-8 md:p-12 relative overflow-hidden">
                                    <span className="text-xs uppercase tracking-[0.3em] text-gray-400 mb-2 block leading-none tracking-widest">Estimated Home Price</span>
                                    <h2 className="text-6xl md:text-8xl leading-none mb-4 tracking-tighter">{formatCurrency(results.homePrice)}</h2>
                                    <p className="text-xl text-gray-500 max-w-2xl mx-auto mb-10 font-medium leading-relaxed">
                                        With a <span className="text-[#b40101] tracking-tight">{formatCurrency(monthlyGoal)}</span> monthly target and a <span className="text-[#b40101] tracking-tight">{formatCurrency(results.downPaymentAmount)}</span> down payment we should start looking for homes in this price range.
                                    </p>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-left leading-none">
                                        <div className="bg-gray-50 p-6 rounded-lg border border-gray-100">
                                            <div className="flex items-center gap-2 mb-4"><Icon name="Building" color="#b40101" size={20} /><h3 className="text-sm uppercase font-black leading-none">Loan Costs Fixed</h3></div>
                                            <div className="flex justify-between mb-2 font-black uppercase text-[10px] text-gray-500 tracking-tighter leading-none"><span>Principal and Interest</span><span className="text-[#212121] text-sm">{formatCurrency(results.piti.principalInterest)}</span></div>
                                            <div className="flex justify-between font-black uppercase text-[10px] text-gray-500 tracking-tighter leading-none"><span>Mortgage Insurance</span><span className="text-[#212121] text-sm">{formatCurrency(results.piti.pmi)}</span></div>
                                        </div>
                                        <div className="bg-gray-50 p-6 rounded-lg border border-gray-100">
                                            <div className="flex items-center gap-2 mb-4"><Icon name="ShieldCheck" color="#b40101" size={20} /><h3 className="text-sm uppercase font-black leading-none">Property Costs Flexible</h3></div>
                                            <div className="flex justify-between mb-2 font-black uppercase text-[10px] text-gray-500 tracking-tighter leading-none"><span>Property Taxes</span><span className="text-[#212121] text-sm">{formatCurrency(results.piti.taxes)}</span></div>
                                            <div className="flex justify-between font-black uppercase text-[10px] text-gray-500 tracking-tighter leading-none"><span>Home Insurance</span><span className="text-[#212121] text-sm">{formatCurrency(results.piti.insurance)}</span></div>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 font-black leading-none">
                                    <div className="bg-[#212121] text-white p-8 rounded-lg shadow-xl text-left relative overflow-hidden group font-black">
                                        <div className="relative z-10 font-black">
                                            <h3 className="text-2xl italic uppercase mb-3 leading-none tracking-tighter">Step 1 Get Preapproved</h3>
                                            <p className="text-gray-300 text-sm mb-6 mt-4 font-medium leading-relaxed font-black">Once we have your verified preapproval we will know exactly how local taxes in different RI and MA towns affect your payment.</p>
                                            <button onClick={() => setShowLeadForm(true)} className="w-full bg-[#b40101] hover:bg-red-700 text-white font-black py-4 rounded transition-all uppercase tracking-widest text-xs shadow-lg leading-none">Verify Your Buying Power <Icon name="ArrowRight" className="inline ml-1" size={14} /></button>
                                        </div>
                                        <div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none leading-none"><Icon name="Home" size={140} /></div>
                                    </div>
                                    <div className="bg-white border-2 border-[#212121] p-8 rounded-lg flex flex-col justify-between text-left leading-none">
                                        <div>
                                            <h3 className="text-2xl italic uppercase mb-3 leading-none tracking-tighter">Step 2 Start The Hunt</h3>
                                            <p className="text-gray-600 text-sm mb-6 mt-4 font-medium italic leading-relaxed">Search homes on my website up to your estimated budget of {formatCurrency(results.homePrice)} right now.</p>
                                        </div>
                                        <a href={`${JOE_INFO.kwSearchBase}${results.homePrice}`} target="_blank" className="w-full border-2 border-[#212121] hover:bg-gray-50 text-[#212121] font-black py-4 rounded text-center uppercase tracking-widest text-xs transition-all leading-none font-black">See Homes in Budget <Icon name="Globe" className="inline ml-1" size={14} /></a>
                                    </div>
                                </div>

                                <div className="mt-12 flex flex-col md:flex-row items-center gap-8 p-8 bg-white rounded-lg border border-gray-200 text-left relative overflow-hidden leading-none font-black">
                                    <div className="w-32 h-32 rounded-full border-4 border-[#b40101] overflow-hidden shrink-0 shadow-lg bg-gray-100">
                                        <img src={JOE_INFO.headshotUrl} alt={JOE_INFO.name} className="w-full h-full object-cover" onError={(e) => { e.target.style.display = 'none'; }} />
                                    </div>
                                    <div className="flex-1 z-10">
                                        <h4 className="text-2xl uppercase italic leading-none">{JOE_INFO.name}</h4>
                                        <div className="mt-2 mb-4 flex flex-wrap items-center gap-3">
                                            <img src={JOE_INFO.platinumLogoUrl} alt="Platinum Logo" className="h-8 w-auto object-contain" onError={(e) => { e.target.style.display = 'none'; }} />
                                            <span className="text-gray-300 font-thin">|</span>
                                            <p className="text-xs text-gray-500 uppercase tracking-wider leading-none">{JOE_INFO.brokerage}</p>
                                        </div>
                                        <p className="text-sm text-gray-600 leading-relaxed font-medium mb-6">I am here to help you navigate every step of the home buying journey in Rhode Island and Massachusetts. Let us turn these estimates into a plan for your future home.</p>
                                        <div className="flex flex-wrap gap-x-8 gap-y-3 text-sm font-black text-[#212121] leading-none">
                                            <a href={`tel:${JOE_INFO.phone.replace(/\D/g,'')}`} className="flex items-center gap-2 hover:text-[#b40101] transition-colors leading-none"><Icon name="Phone" size={14} color="#b40101" /> {JOE_INFO.phone}</a>
                                            <a href={`mailto:${JOE_INFO.email}`} className="flex items-center gap-2 hover:text-[#b40101] transition-colors leading-none"><Icon name="Mail" size={14} color="#b40101" /> {JOE_INFO.email}</a>
                                            <a href={`https://${JOE_INFO.website}`} target="_blank" className="flex items-center gap-2 hover:text-[#b40101] transition-colors uppercase italic leading-none"><Icon name="Globe" size={14} color="#b40101" /> {JOE_INFO.website}</a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {showLeadForm && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-[#212121]/90 backdrop-blur-sm animate-in fade-in duration-200">
                            <div className="bg-white w-full max-w-lg rounded-lg shadow-2xl overflow-hidden animate-in zoom-in duration-300 font-black text-[#212121]">
                                <div className="bg-[#b40101] p-6 text-white flex justify-between items-center font-black leading-none">
                                    <div><h3 className="text-xl italic uppercase leading-none tracking-tighter">Ready to Verify</h3><p className="text-xs text-red-100 mt-1 font-medium italic leading-none">Let us turn this estimate into a formal preapproval.</p></div>
                                    <button onClick={() => setShowLeadForm(false)} className="text-white uppercase text-[10px] hover:text-red-200 tracking-widest leading-none font-black">Close</button>
                                </div>
                                <div className="p-8 font-black">
                                    {!formSubmitted ? (
                                        <form onSubmit={(e) => { e.preventDefault(); setFormSubmitted(true); }} className="space-y-4 font-black leading-none">
                                            <div><label className="block text-[10px] uppercase mb-1 tracking-widest leading-none">Full Name</label><input required type="text" placeholder="First and Last" className="w-full bg-gray-50 border border-gray-200 rounded py-3 px-4 outline-none focus:border-[#b40101] font-black" /></div>
                                            <div className="grid grid-cols-2 gap-4 font-black">
                                                <div><label className="block text-[10px] uppercase mb-1 tracking-widest leading-none">Email</label><input required type="email" placeholder="Email Address" className="w-full bg-gray-50 border border-gray-200 rounded py-3 px-4 outline-none focus:border-[#b40101] font-black" /></div>
                                                <div><label className="block text-[10px] uppercase mb-1 tracking-widest leading-none">Phone</label><input required type="tel" placeholder="Cell Number" className="w-full bg-gray-50 border border-gray-200 rounded py-3 px-4 outline-none focus:border-[#b40101] font-black" /></div>
                                            </div>
                                            <button type="submit" className="w-full bg-[#212121] hover:bg-[#b40101] text-white font-black py-4 rounded uppercase text-xs shadow-lg transition-all tracking-widest leading-none">Send to Joe Pine</button>
                                            <p className="text-[9px] text-gray-400 text-center uppercase tracking-tighter mt-4 leading-relaxed font-black">I will review your numbers and intro you to a local lending expert.</p>
                                        </form>
                                    ) : (
                                        <div className="text-center py-12 space-y-6 animate-in zoom-in duration-300 font-black leading-none">
                                            <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto shadow-inner leading-none"><Icon name="CheckCircle" size={40} color="#16a34a" /></div>
                                            <div><h4 className="text-2xl uppercase italic tracking-tighter">Talk soon</h4><p className="text-gray-600 font-black mt-2 leading-relaxed">I have received your information and I will be in touch shortly.</p></div>
                                            <button onClick={() => setShowLeadForm(false)} className="bg-[#212121] hover:bg-[#b40101] text-white px-10 py-4 rounded uppercase text-xs tracking-widest transition-colors leading-none font-black">Close Window</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="max-w-6xl mx-auto px-4 mt-12 pb-12 leading-none font-black">
