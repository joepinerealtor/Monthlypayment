<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Payment to Home Price Calculator | Joe Pine</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #f2f2f2;
        }
        .premium-shadow {
            box-shadow: 0 4px 20px -5px rgba(0, 0, 0, 0.05), 0 2px 10px -5px rgba(0, 0, 0, 0.03);
        }
        select { 
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); 
            background-position: right 0.5rem center; 
            background-repeat: no-repeat; 
            background-size: 1.25em 1.25em; 
            padding-right: 2rem; 
            -webkit-appearance: none; 
            -moz-appearance: none; 
            appearance: none; 
        }
        @media print {
            @page {
                size: letter;
                margin: 0.5cm;
            }
            .no-print { display: none !important; }
            body { background-color: white !important; font-size: 9pt !important; }
            .premium-shadow { box-shadow: none !important; border: 1px solid #eee !important; }
            .max-w-6xl { max-width: 100% !important; width: 100% !important; padding: 0 !important; margin: 0 !important; }
            .grid-cols-12 { display: flex !important; flex-direction: row !important; gap: 15px !important; align-items: start !important; }
            .lg\:col-span-4 { width: 32% !important; flex-shrink: 0 !important; }
            .lg\:col-span-8 { width: 68% !important; flex-shrink: 0 !important; }
            h2 { font-size: 2.5rem !important; margin-bottom: 0.5rem !important; }
            p { margin-bottom: 0.5rem !important; }
            footer { margin-top: 15px !important; border-top: 1px solid #eee !important; padding-top: 10px !important; }
        }
    </style>
</head>
<body class="text-[#212121] antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 16, className = "", color = "currentColor" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && window.lucide[name]) {
                    const iconElement = iconRef.current;
                    if (iconElement) {
                        iconElement.innerHTML = "";
                        const svg = window.lucide.createIcons({
                            icons: { [name]: window.lucide[name] },
                            attrs: { strokeWidth: 2.5, width: size, height: size, class: className, stroke: color }
                        });
                    }
                }
            }, [name, size, className, color]);
            return <span ref={iconRef} className="inline-flex items-center justify-center leading-none"></span>;
        };

        const App = () => {
            const JOE_INFO = {
                name: "Joe Pine",
                title: "REALTOR RI & MA",
                team: "Platinum Real Estate Group",
                brokerage: "Keller Williams Leading Edge",
                phone: "401.327.0888",
                email: "JoePine@KW.com",
                address: "28 Thurber Blvd, Smithfield, RI 02917",
                website: "www.JoePine.com",
                headshotUrl: "Joe (1).JPG",
                logoUrl: "KellerWilliams_Realty_LeadingEdge_Logo_RGB.png",
                platinumLogoUrl: "Platinum Logo Black Transparent (1).png",
                kwSearchBase: "https://joepine.kw.com/search/sale?viewport=42.17805594042946%2C-70.57921899499948%2C41.454456956957046%2C-71.89757836999948&price=null%2C"
            };

            const [monthlyGoal, setMonthlyGoal] = useState(2500);
            const [downPaymentMode, setDownPaymentMode] = useState('percentage'); 
            const [downPaymentPercent, setDownPaymentPercent] = useState(3.5);
            const [downPaymentFixed, setDownPaymentFixed] = useState(60000);
            const [interestRate, setInterestRate] = useState(6.25);
            const [liveRateValue, setLiveRateValue] = useState(null);
            const [isRateLive, setIsRateLive] = useState(false);
            const [rateDate, setRateDate] = useState("");
            const [loanTerm, setLoanTerm] = useState(30);
            const [stateTaxRate, setStateTaxRate] = useState(1.25); 
            const [insuranceEstimate, setInsuranceEstimate] = useState(125);
            const [showLeadForm, setShowLeadForm] = useState(false);
            const [formSubmitted, setFormSubmitted] = useState(false);

            const captureRef = useRef(null);

            const [results, setResults] = useState({
                homePrice: 0,
                loanAmount: 0,
                downPaymentAmount: 0,
                piti: { principalInterest: 0, taxes: 0, insurance: 0, pmi: 0 }
            });

            const PRESET_PERCENTAGES = [0, 3.5, 5, 10, 15, 20];

            useEffect(() => {
                const fetchLiveRate = async () => {
                    const apiKey = ""; 
                    const systemPrompt = "You are a financial data provider. Search for current US 30 year fixed rates. Respond JSON: { \"rate\": 6.45, \"date\": \"Month Day Year\" }. No dashes.";
                    const userQuery = "What is the actual current average 30 year fixed mortgage interest rate today and current date";

                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userQuery }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                tools: [{ "google_search": {} }],
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });

                        if (response.ok) {
                            const result = await response.json();
                            const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                            if (text) {
                                try {
                                    const data = JSON.parse(text.replace(/```json/g, '').replace(/```/g, '').trim());
                                    if (data.rate) {
                                        setInterestRate(parseFloat(data.rate));
                                        setLiveRateValue(parseFloat(data.rate));
                                        setRateDate(data.date || "");
                                        setIsRateLive(true);
                                    }
                                } catch (e) { }
                            }
                        }
                    } catch (error) { }
                };
                fetchLiveRate();
            }, []);

            useEffect(() => {
                const r = (interestRate / 100) / 12;
                const n = loanTerm * 12;
                const t = (stateTaxRate / 100) / 12;
                const mc = r > 0 ? (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1) : 1 / n;
                
                let finalPrice = 0;
                let finalDown = 0;
                let pmiRate = 0;

                const getPMIRate = (ltvPercent) => {
                    if (ltvPercent <= 80) return 0;
                    if (ltvPercent > 95) return (0.65 / 100) / 12; 
                    if (ltvPercent > 90) return (0.50 / 100) / 12; 
                    if (ltvPercent > 85) return (0.35 / 100) / 12; 
                    return (0.20 / 100) / 12; 
                };

                if (downPaymentMode === 'percentage') {
                    const p = downPaymentPercent / 100;
                    const ltv = (1 - p) * 100;
                    pmiRate = getPMIRate(ltv);
                    finalPrice = (monthlyGoal - insuranceEstimate) / (((1 - p) * mc) + t + ((1 - p) * pmiRate));
                    finalDown = finalPrice * p;
                } else {
                    const initialPrice = (monthlyGoal - insuranceEstimate + (downPaymentFixed * mc)) / (mc + t);
                    const ltv = ((initialPrice - downPaymentFixed) / initialPrice) * 100;
                    pmiRate = getPMIRate(ltv);
                    finalPrice = (monthlyGoal - insuranceEstimate + (downPaymentFixed * mc) + (downPaymentFixed * pmiRate)) / (mc + t + pmiRate);
                    finalDown = downPaymentFixed;
                }

                setResults({
                    homePrice: Math.round(finalPrice),
                    loanAmount: Math.round(finalPrice - finalDown),
                    downPaymentAmount: Math.round(finalDown),
                    piti: {
                        principalInterest: Math.round((finalPrice - finalDown) * mc),
                        taxes: Math.round(finalPrice * t),
                        insurance: insuranceEstimate,
                        pmi: Math.round((finalPrice - finalDown) * pmiRate)
                    }
                });
            }, [monthlyGoal, downPaymentMode, downPaymentPercent, downPaymentFixed, interestRate, loanTerm, stateTaxRate, insuranceEstimate]);

            const formatCurrency = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(val);

            const handleSaveImage = () => {
                if (captureRef.current) {
                    html2canvas(captureRef.current, { 
                        backgroundColor: '#f2f2f2', 
                        scale: 2,
                        logging: false,
                        useCORS: true
                    }).then(canvas => {
                        const link = document.createElement('a');
                        link.download = `Joe Pine Home Affordability Summary.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                    });
                }
            };

            const handlePrint = () => {
                window.print();
            };

            const shareText = `I calculated my home buying power with Joe Pine! Based on a ${formatCurrency(monthlyGoal)} target my range is ${formatCurrency(results.homePrice)}.`;
            const mailtoLink = `mailto:?subject=My Home Buying Power Estimate&body=${encodeURIComponent(shareText + ' Learn more at ' + JOE_INFO.website)}`;
            const smsLink = `sms:?body=${encodeURIComponent(shareText + ' ' + JOE_INFO.website)}`;

            return (
                <div className="min-h-screen pb-6 font-black text-[#212121]">
                    <nav className="bg-white/95 backdrop-blur-sm py-2 px-6 sticky top-0 z-50 shadow-sm border-b-2 border-[#b40101] no-print">
                        <div className="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-2 font-black">
                            <div className="flex items-center gap-4">
                                <img src={JOE_INFO.logoUrl} alt="KW Logo" className="h-7 w-auto object-contain" />
                                <div className="h-6 w-[1.5px] bg-gray-200 hidden sm:block font-black" />
                                <img src={JOE_INFO.platinumLogoUrl} alt="Platinum Logo" className="h-7 w-auto object-contain" />
                            </div>
                            <div className="text-center sm:text-right font-black">
                                <p className="text-sm uppercase italic leading-none font-black">{JOE_INFO.name}</p>
                                <p className="text-[9px] text-[#b40101] mt-1 tracking-widest leading-none font-black">{JOE_INFO.phone}</p>
                            </div>
                        </div>
                    </nav>

                    <div className="max-w-6xl mx-auto px-4 pt-4 font-black" ref={captureRef}>
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-5 items-start">
                            
                            {/* Left Column: Branding and Inputs */}
                            <div className="lg:col-span-4 space-y-5">
                                <div className="bg-white rounded-xl premium-shadow border border-gray-100 overflow-hidden font-black">
                                    <div className="bg-[#b40101] p-3 text-white flex items-center gap-2 italic font-black">
                                        <Icon name="Calculator" size={14} /> 
                                        <h2 className="font-black uppercase text-[10px] tracking-widest leading-none">Parameters</h2>
                                    </div>
                                    <div className="p-4 space-y-4">
                                        <div>
                                            <label className="block text-[10px] uppercase mb-1 tracking-[0.15em] font-black text-gray-400 leading-none">Monthly Goal</label>
                                            <div className="relative font-black">
                                                <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 font-black">$</span>
                                                <input type="number" value={monthlyGoal} onChange={(e) => setMonthlyGoal(Number(e.target.value))} className="w-full bg-gray-50 border-2 border-gray-100 rounded-lg py-2 pl-9 pr-4 focus:border-[#b40101] outline-none font-black text-lg transition-all" />
                                            </div>
                                        </div>

                                        <div>
                                            <div className="flex justify-between items-center mb-1 leading-none font-black">
                                                <label className="text-[10px] uppercase tracking-[0.15em] text-gray-400">Down Payment</label>
                                                <div className="flex bg-gray-100 p-0.5 rounded-md border border-gray-200 no-print">
                                                    <button onClick={() => setDownPaymentMode('percentage')} className={`px-3 py-0.5 text-[9px] font-black rounded ${downPaymentMode === 'percentage' ? 'bg-white text-[#b40101] shadow-sm' : 'text-gray-400'}`}>%</button>
                                                    <button onClick={() => setDownPaymentMode('fixed')} className={`px-3 py-0.5 text-[9px] font-black rounded ${downPaymentMode === 'fixed' ? 'bg-white text-[#b40101] shadow-sm' : 'text-gray-400'}`}>$</button>
                                                </div>
                                            </div>
                                            <div className="space-y-2">
                                                <div className="grid grid-cols-6 gap-1 no-print">
                                                    {PRESET_PERCENTAGES.map(pct => (
                                                        <button key={pct} onClick={() => setDownPaymentPercent(pct)} className={`py-1.5 text-[10px] font-black rounded-md border transition-all ${downPaymentPercent === pct ? 'border-[#b40101] bg-red-50 text-[#b40101]' : 'border-gray-100 text-gray-400'}`}>{pct}%</button>
                                                    ))}
                                                </div>
                                                <div className="bg-gray-50 p-2 rounded-lg border border-gray-100 flex justify-between items-center font-black leading-none"><span className="text-[8px] text-gray-400 uppercase tracking-widest leading-none font-black">Estimated Cash</span><span className="text-[10px] font-black">{formatCurrency(results.downPaymentAmount)}</span></div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-3 font-black">
                                            <div>
                                                <label className="block text-[10px] uppercase mb-1 leading-none text-gray-400 tracking-[0.15em]">Rate %</label>
                                                <input type="number" step="0.01" value={interestRate} onChange={(e) => setInterestRate(Number(e.target.value))} className="w-full bg-gray-50 border-2 border-gray-100 rounded-lg py-2 px-3 focus:border-[#b40101] outline-none font-black text-sm" />
                                                <div className="pt-1 px-1">
                                                    {isRateLive ? (
                                                        <div className="flex flex-col gap-0.5">
                                                            <div className="flex items-center gap-1.5 text-[8px] text-[#b40101] font-black uppercase font-black"><Icon name="Activity" size={10} className="animate-pulse" color="#b40101" /> Live</div>
                                                            <div className="text-[7px] text-gray-500 font-black uppercase italic leading-tight">as of {rateDate}</div>
                                                        </div>
                                                    ) : <div className="text-[8px] text-gray-300 font-black uppercase animate-pulse">Updating</div>}
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-[10px] uppercase mb-1 leading-none text-gray-400 tracking-[0.15em]">Location</label>
                                                <select value={stateTaxRate} onChange={(e) => setStateTaxRate(Number(e.target.value))} className="w-full bg-gray-50 border-2 border-gray-100 rounded-lg py-2 px-3 focus:border-[#b40101] outline-none font-black text-sm font-black">
                                                    <option value={1.25}>RI</option>
                                                    <option value={1.15}>MA</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Personal Branding Section */}
                                <div className="p-4 bg-white rounded-xl border-t-4 border-[#b40101] premium-shadow font-black flex flex-col items-center text-center">
                                    <div className="w-16 h-16 rounded-full border-2 border-[#b40101] overflow-hidden shadow-md mb-2 ring-4 ring-gray-50">
                                        <img src={JOE_INFO.headshotUrl} alt={JOE_INFO.name} className="w-full h-full object-cover font-black" />
                                    </div>
                                    <h4 className="text-sm uppercase italic leading-none mb-1 font-black">{JOE_INFO.name}</h4>
                                    <div className="mb-3 leading-none">
                                        <p className="text-[8px] text-gray-400 uppercase leading-none mb-1 tracking-tight">{JOE_INFO.brokerage}</p>
                                        <p className="text-[8px] text-[#b40101] uppercase tracking-widest leading-none font-black">{JOE_INFO.team}</p>
                                    </div>
                                    <div className="w-full space-y-1.5 text-[8px] font-black">
                                        <a href={`tel:${JOE_INFO.phone.replace(/\D/g,'')}`} className="flex items-center justify-center gap-2 py-2 bg-gray-50 rounded-lg hover:text-[#b40101] transition-all uppercase tracking-[0.1em] border border-transparent hover:border-red-50 font-black"><Icon name="Phone" size={10} color="#b40101" /> {JOE_INFO.phone}</a>
                                        <a href={`mailto:${JOE_INFO.email}`} className="flex items-center justify-center gap-2 py-2 bg-gray-50 rounded-lg hover:text-[#b40101] transition-all uppercase tracking-[0.1em] border border-transparent hover:border-red-50 font-black"><Icon name="Mail" size={10} color="#b40101" /> {JOE_INFO.email}</a>
                                        <a href={`https://${JOE_INFO.website}`} target="_blank" className="flex items-center justify-center gap-2 py-2 bg-gray-50 rounded-lg hover:text-[#b40101] transition-all uppercase tracking-[0.1em] border border-transparent hover:border-red-50 italic"><Icon name="Globe" size={10} color="#b40101" /> {JOE_INFO.website}</a>
                                    </div>
                                </div>

                                {/* Share and Save Section */}
                                <div className="p-4 bg-white rounded-xl premium-shadow border border-gray-100 font-black no-print">
                                    <div className="flex items-center gap-2 mb-4 italic">
                                        <Icon name="Share2" size={14} color="#b40101" />
                                        <p className="text-[10px] uppercase tracking-widest text-[#212121] leading-none">Share and Save</p>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <button onClick={handlePrint} className="flex items-center justify-center gap-2 py-2.5 bg-[#b40101] text-white rounded-lg hover:bg-red-700 transition-all uppercase text-[8px] tracking-widest font-black shadow-sm font-black leading-none"><Icon name="Printer" size={10} color="white" /> Print</button>
                                        <button onClick={handleSaveImage} className="flex items-center justify-center gap-2 py-2.5 bg-[#212121] text-white rounded-lg hover:bg-black transition-all uppercase text-[8px] tracking-widest font-black shadow-sm font-black leading-none"><Icon name="Image" size={10} color="white" /> Image</button>
                                        <a href={mailtoLink} className="flex items-center justify-center gap-2 py-2.5 bg-[#212121] text-white rounded-lg hover:bg-black transition-all uppercase text-[8px] tracking-widest font-black shadow-sm font-black leading-none"><Icon name="Mail" size={10} color="white" /> Email</a>
                                        <a href={smsLink} className="flex items-center justify-center gap-2 py-2.5 bg-[#212121] text-white rounded-lg hover:bg-black transition-all uppercase text-[8px] tracking-widest font-black shadow-sm font-black leading-none"><Icon name="MessageSquare" size={10} color="white" /> Text</a>
                                    </div>
                                </div>
                            </div>

                            {/* Main Result Column */}
                            <div className="lg:col-span-8 space-y-5 text-center font-black">
                                <div className="bg-white rounded-xl premium-shadow border border-gray-100 p-6 md:p-8 relative overflow-hidden font-black">
                                    <div className="absolute top-0 left-0 w-full h-1 bg-[#b40101]"></div>
                                    <span className="text-[10px] uppercase tracking-[0.4em] text-gray-400 mb-1 block font-black leading-none uppercase font-black">Estimated Home Price</span>
                                    <h2 className="text-5xl md:text-6xl font-black text-[#212121] leading-none mb-4 tracking-tighter drop-shadow-sm font-black">{formatCurrency(results.homePrice)}</h2>
                                    <p className="text-base text-gray-500 max-w-xl mx-auto mb-6 font-black leading-relaxed uppercase tracking-tight font-black font-black">
                                        With a <span className="text-[#b40101] font-black tracking-tight font-black font-black">{formatCurrency(monthlyGoal)}</span> monthly target and a <span className="text-[#b40101] font-black tracking-tight font-black font-black font-black">{formatCurrency(results.downPaymentAmount)}</span> down payment we should start looking in this range.
                                    </p>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-left leading-none font-black mb-6">
                                        <div className="bg-gray-50 p-4 rounded-xl border border-gray-100 font-black">
                                            <div className="flex items-center gap-2 mb-3 leading-none font-black font-black font-black"><Icon name="Building" color="#b40101" size={14} /><h3 className="text-[11px] uppercase font-black leading-none tracking-[0.1em] text-gray-500 font-black">Loan Costs</h3></div>
                                            <div className="flex justify-between items-center mb-2 leading-none font-black font-black font-black font-black"><span className="text-[8px] text-gray-500 uppercase tracking-widest leading-none font-black font-black">P & I</span><span className="text-[11px] leading-none font-black font-black font-black font-black">{formatCurrency(results.piti.principalInterest)}</span></div>
                                            <div className="flex justify-between items-center leading-none font-black font-black font-black font-black font-black"><span className="text-[8px] text-gray-500 uppercase tracking-widest leading-none font-black font-black font-black">PMI</span><span className="text-[11px] leading-none font-black font-black font-black font-black font-black">{formatCurrency(results.piti.pmi)}</span></div>
                                        </div>
                                        <div className="bg-gray-50 p-4 rounded-xl border border-gray-100 font-black font-black">
                                            <div className="flex items-center gap-2 mb-3 leading-none font-black font-black font-black font-black font-black"><Icon name="ShieldCheck" color="#b40101" size={14} /><h3 className="text-[11px] uppercase font-black leading-none tracking-[0.1em] text-gray-500 font-black font-black font-black font-black">Escrowed Funds</h3></div>
                                            <div className="flex justify-between items-center mb-2 leading-none font-black font-black font-black font-black font-black font-black"><span className="text-[8px] text-gray-500 uppercase tracking-widest leading-none font-black font-black font-black">Taxes</span><span className="text-[11px] leading-none font-black font-black font-black font-black font-black font-black font-black">{formatCurrency(results.piti.taxes)}</span></div>
                                            <div className="flex justify-between items-center leading-none font-black font-black font-black font-black font-black font-black font-black"><span className="text-[8px] text-gray-500 uppercase tracking-widest leading-none font-black font-black font-black font-black">Insurance</span><span className="text-[11px] leading-none font-black font-black font-black font-black font-black font-black font-black font-black">{formatCurrency(results.piti.insurance)}</span></div>
                                        </div>
                                    </div>

                                    <div className="text-left bg-[#fcfcfc] p-4 rounded-xl border border-gray-100 border-l-4 border-l-[#b40101] font-black font-black font-black font-black">
                                        <h3 className="uppercase text-[10px] mb-2 flex items-center gap-2 tracking-[0.2em] leading-none italic font-black text-[#b40101] font-black font-black font-black font-black font-black"><Icon name="Calendar" size={12} color="#b40101" /> How Escrow Works</h3>
                                        <p className="text-[10px] text-gray-500 leading-relaxed font-black uppercase tracking-wide font-black font-black font-black font-black">
                                            While your loan costs stay the same every month the property costs are the moving target. Each home has its own specific tax assessment and insurance needs. This means two houses listed for the exact same price in different towns could have monthly payments that look nothing alike. Banks take your yearly insurance and tax bill then divide them by 12 months to collect them with your mortgage for a predictable payment.
                                        </p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 font-black leading-none no-print">
                                    <div className="bg-[#212121] text-white p-6 rounded-xl shadow-lg text-left relative overflow-hidden group font-black font-black font-black font-black font-black font-black">
                                        <h3 className="text-base italic uppercase mb-2 leading-none tracking-tight font-black font-black font-black font-black font-black font-black font-black">Step 1 Get Preapproved</h3>
                                        <p className="text-gray-400 text-[10px] mb-4 leading-relaxed font-black uppercase tracking-wide font-black font-black font-black font-black font-black font-black font-black font-black">
                                            This calculator is a rough starting point. To get a precise number a lender will review your income and credit for a formal preapproval. Click below to start verifying your power with a local expert.
                                        </p>
                                        <button onClick={() => setShowLeadForm(true)} className="w-full bg-[#b40101] hover:bg-red-700 text-white font-black py-3 rounded-lg transition-all uppercase tracking-widest text-[8px] shadow-lg flex items-center justify-center gap-2 leading-none font-black font-black font-black font-black font-black font-black font-black font-black font-black">Verify Your Buying Power <Icon name="ArrowRight" size={10} color="white" /></button>
                                    </div>
                                    <div className="bg-white border-2 border-[#212121] p-6 rounded-xl flex flex-col justify-between text-left shadow-sm font-black font-black font-black font-black font-black font-black font-black font-black">
                                        <div>
                                            <h3 className="text-base italic uppercase mb-2 leading-none tracking-tight font-black font-black font-black font-black font-black font-black font-black font-black font-black">Step 2 Start The Hunt</h3>
                                            <p className="text-gray-600 text-[10px] mb-4 leading-relaxed font-black uppercase tracking-wide font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black">
                                                Are you ready to see what <span className="font-black text-[#b40101] text-base font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black">{formatCurrency(results.homePrice)}</span> can get you in RI or MA? Click below to take a look and see exactly what is on the market for you right now.
                                            </p>
                                        </div>
                                        <a href={`${JOE_INFO.kwSearchBase}${results.homePrice}`} target="_blank" className="w-full border-2 border-[#212121] hover:bg-[#212121] hover:text-white text-[#212121] font-black py-3 rounded-lg text-center uppercase tracking-widest text-[8px] transition-all flex items-center justify-center gap-2 leading-none font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black">See Homes in Budget <Icon name="Home" size={10} color="#b40101" /></a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Lead bridge modal */}
                    {showLeadForm && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-[#212121]/80 backdrop-blur-sm animate-in fade-in duration-300 font-black font-black font-black font-black font-black font-black font-black">
                            <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden font-black text-[#212121] font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black">
                                <div className="bg-[#b40101] p-5 text-white flex justify-between items-center font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black">
                                    <h3 className="text-base italic uppercase leading-none font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black">Verify Power</h3>
                                    <button onClick={() => setShowLeadForm(false)} className="text-white hover:text-red-200 transition-colors leading-none font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black"><Icon name="X" size={16} /></button>
                                </div>
                                <div className="p-6 font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black">
                                    {!formSubmitted ? (
                                        <form onSubmit={(e) => { e.preventDefault(); setFormSubmitted(true); }} className="space-y-4 font-black leading-none font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black">
                                            <div><label className="block text-[9px] uppercase mb-1.5 tracking-widest text-gray-400 font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black">Full Name</label><input required type="text" className="w-full bg-gray-50 border-2 border-gray-100 rounded-lg py-2 px-3 outline-none focus:border-[#b40101] font-black text-sm font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black" /></div>
                                            <div><label className="block text-[9px] uppercase mb-1.5 tracking-widest text-gray-400 font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black">Email Address</label><input required type="email" className="w-full bg-gray-50 border-2 border-gray-100 rounded-lg py-2 px-3 outline-none focus:border-[#b40101] font-black text-sm font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black" /></div>
                                            <div><label className="block text-[9px] uppercase mb-1.5 tracking-widest text-gray-400 font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black">Cell</label><input required type="tel" className="w-full bg-gray-50 border-2 border-gray-100 rounded-lg py-2 px-3 outline-none focus:border-[#b40101] font-black text-sm font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black" /></div>
                                            <button type="submit" className="w-full bg-[#212121] hover:bg-[#b40101] text-white font-black py-3 rounded-lg uppercase text-[10px] tracking-widest transition-all mt-2 font-black leading-none font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black">Send to Joe Pine</button>
                                        </form>
                                    ) : (
                                        <div className="text-center py-8 space-y-5 font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black">
                                            <div className="w-12 h-12 bg-green-50 text-green-600 rounded-full flex items-center justify-center mx-auto shadow-inner leading-none font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black"><Icon name="CheckCircle" size={24} color="#16a34a" /></div>
                                            <div><h4 className="text-lg uppercase italic leading-none font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black">Talk soon</h4><p className="text-gray-500 font-black mt-2 text-[10px] uppercase tracking-widest leading-relaxed font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black">Info received I will be in touch shortly.</p></div>
                                            <button onClick={() => setShowLeadForm(false)} className="bg-[#212121] text-white px-8 py-2.5 rounded-lg font-black uppercase text-[10px] tracking-widest transition-all font-black leading-none font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black">Close</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="max-w-6xl mx-auto px-4 mt-8 pb-6 leading-none font-black text-[#212121] font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black">
                        <div className="bg-gray-200 h-[1px] w-full mb-6 opacity-50 font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black" />
                        <div className="text-center font-black space-y-4 font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black">
                            <p className="text-[10px] text-gray-500 leading-relaxed font-black uppercase tracking-wide max-w-4xl mx-auto font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black">
                                These numbers are a helpful theoretical way to see how much home you could potentially afford based on your desired monthly payment. Estimates provided are for informational purposes only and do not constitute a commitment to lend. Final monthly payments are decided by your specific loan program and the town tax assessment once you pick a home. Joe Pine, Keller Williams Leading Edge and Platinum Real Estate Group support equal housing opportunity and each office is independently owned and operated. Only a licensed mortgage professional can issue a formal preapproval to lend. Always consult with a licensed loan professional for specific mortgage advice and financial information.
                            </p>
                            <p className="text-[8px] text-gray-300 font-black uppercase tracking-widest font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black">Rhode Island and Massachusetts Real Estate</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
